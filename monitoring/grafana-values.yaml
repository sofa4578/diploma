
# Helm values для встановлення Grafana у namespace 'monitoring'
# Команда: helm upgrade --install grafana grafana/grafana \
#           -n monitoring -f monitoring/grafana-values.yaml

adminPassword: "diploma2024"    # Змінити перед захистом!

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local:80
      isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: default
      orgId: 1
      folder: Diploma
      type: file
      options:
        path: /var/lib/grafana/dashboards/default

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
